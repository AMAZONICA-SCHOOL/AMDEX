  <style>
    :root {
      --bg-dark: #101216;
      --border-neon: #7bb0ff;
    }
    
    body {
      background-color: var(--bg-dark);
      color: #f1f5f9;
      min-height: 100vh;
      font-size: 1.15rem;
      position: relative;
      overflow-x: hidden;
    }

    /* --- EFECTO REJILLA INFINITA (Synthwave/Retro 3D) --- */
    .infinite-grid-wrapper {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow: hidden;
      z-index: -2;
      background-color: var(--bg-dark);
    }

    /* Línea del horizonte brillante */
    .infinite-grid-wrapper::after {
      content: '';
      position: absolute;
      top: 55%; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, #7bb0ff, #c58dff, #6be8a3, transparent);
      box-shadow: 0 0 20px 3px rgba(123, 176, 255, 0.4);
    }

    /* Rejilla animada */
    .infinite-grid {
      position: absolute;
      top: 55%; left: -50%; width: 200%; height: 100vh;
      background-image: 
        linear-gradient(rgba(123, 176, 255, 0.4) 2px, transparent 2px),
        linear-gradient(90deg, rgba(123, 176, 255, 0.4) 2px, transparent 2px);
      background-size: 40px 40px;
      transform: perspective(600px) rotateX(75deg) translateZ(0);
      transform-origin: top center;
      animation: grid-scroll 2s linear infinite;
    }

    @keyframes grid-scroll {
      0% { transform: perspective(600px) rotateX(75deg) translateY(0); }
      100% { transform: perspective(600px) rotateX(75deg) translateY(40px); }
    }

    /* --- EFECTO PANTALLA CRT (Scanlines) --- */
    .scanlines {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
      background-size: 100% 4px;
      z-index: 9999;
      pointer-events: none;
    }

    /* --- ESTILO DE PANELES (Tipo Pokémon / Arcade UI) --- */
    .rpg-panel {
      background: rgba(21, 24, 30, 0.95);
      border: 4px solid var(--border-neon);
      border-radius: 8px;
      box-shadow: 
        inset 0 0 0 3px rgba(21, 24, 30, 1), 
        inset 0 0 0 5px var(--border-neon),  
        0 8px 0 rgba(0, 0, 0, 0.6),          
        0 0 20px rgba(123, 176, 255, 0.15);  
      backdrop-filter: blur(4px);
      margin-bottom: 8px;
    }

    .rpg-card {
      background: rgba(35, 40, 49, 0.9);
      border: 3px solid #3b4252;
      border-radius: 6px;
      box-shadow: 0 5px 0 rgba(0,0,0,0.4);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .rpg-card:hover {
      border-color: #6be8a3;
      box-shadow: 
        0 5px 0 rgba(0,0,0,0.5),
        0 0 15px rgba(107, 232, 163, 0.3);
      transform: translateY(-2px);
    }

    /* --- MARQUEE Y FLICKER (Adaptados a Chunky UI) --- */
    @keyframes neon-flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
        border-color: var(--border-neon);
        box-shadow: 
          inset 0 0 0 3px rgba(21, 24, 30, 1), 
          inset 0 0 0 5px var(--border-neon),  
          0 8px 0 rgba(0, 0, 0, 0.6),          
          0 0 20px rgba(123, 176, 255, 0.15);
      }
      20%, 24%, 55% {
        border-color: rgba(123, 176, 255, 0.3);
        box-shadow: 
          inset 0 0 0 3px rgba(21, 24, 30, 1), 
          inset 0 0 0 5px rgba(123, 176, 255, 0.1),  
          0 8px 0 rgba(0, 0, 0, 0.6),          
          0 0 4px rgba(123, 176, 255, 0.05);
      }
    }

    .flicker-neon {
      animation: neon-flicker 9s infinite ease-in-out;
    }

    .marquee-container {
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      width: 100%;
      background: rgba(21, 24, 30, 0.95);
      border: 4px solid #c58dff; /* Morado pastel para destacar el marquee */
      border-radius: 8px;
      box-shadow: 
        inset 0 0 0 3px rgba(21, 24, 30, 1), 
        inset 0 0 0 5px #c58dff,  
        0 6px 0 rgba(0, 0, 0, 0.6);
      margin-bottom: 8px;
    }

    .marquee-content {
      display: inline-block;
      white-space: nowrap;
      padding-left: 100%;
      animation: marquee-scroll 38s linear infinite;
    }

    .marquee-container:hover .marquee-content {
      animation-play-state: paused;
    }

    @keyframes marquee-scroll {
      0% { transform: translate3d(0, 0, 0); }
      100% { transform: translate3d(-100%, 0, 0); }
    }

    /* Asegurar tipografías en elementos interactivos */
    input, select, textarea, button {
      font-family: 'VT323', monospace !important;
      font-size: 1.2rem !important;
      letter-spacing: 0.5px;
    }
    
    button {
      text-transform: uppercase;
    }

    .pixelated {
      image-rendering: pixelated;
    }

    /* Custom Scrollbar Arcade */
    ::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-dark);
      border-left: 2px solid #232831;
    }
    ::-webkit-scrollbar-thumb {
      background: #c58dff;
      border: 3px solid var(--bg-dark);
      border-radius: 6px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #7bb0ff;
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.8; text-shadow: 0 0 10px rgba(255, 208, 92, 0.5); }
      50% { opacity: 0.4; text-shadow: none; }
    }
    .pulsing-glow {
      animation: pulse-glow 2s infinite ease-in-out;
    }
  </style>
</head>

    const LS = {

      } catch {
        return fallback;
      }
    };
    const save = (k, v) => {
      try {
        localStorage.setItem(k, JSON.stringify(v));
      } catch (e) {
        console.error("Error saving to localStorage", e);
      }
    };

          },
          {

            password: 'student123',

            character: 'Titan',

        save(LS.users, seedUsers);
      }

      if (!localStorage.getItem(LS.current)) save(LS.current, null);
      
      const tasks = load(LS.tasks, []);
      if (tasks.length === 0) { itemId);

        showToast(`Adquiriste: ${item.emoji} ${item.name}!`, 'success');

      const handleUseItem = () => {

          showToast('Selecciona un objeto y el tutor destinatario.', 'error');
          return;
        }

        const item = items.find(i => i.id === selectedItemToUse);

      }, [rewards, currentUser]);

                            className="w-full bg-slate-950 border-2 border-slate-800 rounded-lg p-2.5 text-slate-200 focus:outline-none focus:border-indigo-500"
                            placeholder="Usuario único..."
                            value={userForm.username}
                            onChange={e => setUserForm({ ...userForm, username: e.target.value })}
                          />
                        </div>
                        <div>
                          <label className="block text-sm font-bold text-slate-400 mb-1">Clave de Acceso</label>
                          <input 
                            type="password" 
                            className="w-full bg-slate-950 border-2 border-slate-800 rounded-lg p-2.5 text-slate-200 focus:outline-none focus:border-indigo-500"
                  
                            value={itemForm.description}
                            onChange={e => setItemForm({ ...itemForm, description: e.target.value })}
                          />
                        </div>
                        <div className="grid grid-cols-3 gap-2">
                          <div>
                            <label className="block text-sm font-bold text-slate-400 mb-1">Costo AMZ</label>
                            <input 
                              type="number" 
                              className="w-full bg-slate-950 border-2 border-slate-800 rounded-lg p-2 text-slate-200 focus:outline-none"
                              value={itemForm.price}
                              onChange={e => setItemForm({ ...itemForm, price: e.target.value })}
                            />
                          </div>
                          <div>
                            <label className="block text-sm font-bold text-slate-400 mb-1">Tipo de Uso</label>
                            <select 
                              className="w-full bg-slate-950 border-2 border-slate-800 rounded-lg p-2 text-slate-200 focus:outline-none"
                              value={itemForm.useType}
                              onChange={e => setItemForm({ ...itemForm, useType: e.target.value })}
                            >
                              <option value="Uso Único">Uso Único</option>
                              <option value="Uso Múltiple">Uso Múltiple</option>
                              <option value="No Utilizable">No Utilizable</option>
                            </select>
                          </div>
                          <div>
                            <label className="block text-sm font-bold text-slate-400 mb-1">Emoji</label>
                            <input 
                              type="text" 
                              className="w-full bg-slate-950 border-2 border-slate-800 rounded-lg p-2 text-slate-200 focus:outline-none text-center"
                              placeholder="⚡"
                              value={itemForm.emoji}
                              onChange={e => setItemForm({ ...itemForm, emoji: e.target.value })}
                            />
                          </div>
                        </div>
                        <div>
                          <label className="block text-sm font-bold text-slate-400 mb-1">Subir Imagen Real (Opcional)</label>
                          <input 
                            type="file" 
                            accept="image/*"
                            onChange={e => e.target.files?.[0] && handleItemImageUpload(e.target.files[0])}
                            className="text-sm text-slate-300 cursor-pointer font-bold file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-2 file:border-slate-700 file:bg-slate-800 file:text-slate-300 hover:file:bg-slate-700"
                          />
                        </div>
                        <button 
                          onClick={handleSaveCatalogItem}
                          className="w-full py-3 bg-indigo-600 border-2 border-indigo-400 hover:bg-indigo-500 rounded-lg font-bold text-sm shadow-lg"
                        >
                          Guardar Objeto en la Tienda
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              )}

            </div>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
